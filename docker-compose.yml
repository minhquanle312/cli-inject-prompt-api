services:
  prompt-inject-opencode:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3322}:3322"
    environment:
      HOST: 0.0.0.0
      PORT: 3322
      API_KEY: ${API_KEY:?API_KEY is required}
      GLOBAL_CONCURRENCY: ${GLOBAL_CONCURRENCY:-4}
      MAX_QUEUE: ${MAX_QUEUE:-20}
      TIMEOUT_MS: ${TIMEOUT_MS:-332200}
    volumes:
      - commandcode-data:/root/.commandcode
      - gemini-data:/root/.gemini
    healthcheck:
      test:
        - CMD-SHELL
        - "wget -qO- http://127.0.0.1:3322/healthz"
      interval: 5s
      timeout: 20s
      retries: 10
    restart: unless-stopped

volumes:
  commandcode-data:
  gemini-data:
